<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — Perpustakaan DIL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">PERPUSTAKAAN <span>DIL</span></div>
    <div class="auth-sub">Daftar Akun Baru</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div style="background:#FFE8E8;border:2px solid rgba(255,94,94,.4);color:#FF5E5E;border-radius:12px;padding:.7rem 1rem;font-size:.85rem;margin-bottom:1rem;font-weight:700;">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group"><label>Nama Lengkap</label><input type="text" name="nama" class="form-control" placeholder="Nama lengkap..." required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" placeholder="email@contoh.com" required></div>
      <div class="form-group"><label>No. HP</label><input type="text" name="hp" class="form-control" placeholder="08xxxxxxxxxx"></div>
      <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" placeholder="username unik..." required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="Minimal 6 karakter..." required></div>
      <div class="form-group"><label>Konfirmasi Password</label><input type="password" name="confirm_password" class="form-control" placeholder="Ulangi password..." required></div>
      <button type="submit" class="btn btn-purple" style="width:100%;margin-top:.5rem;">📝 Daftar Sekarang</button>
    </form>

    <div class="auth-link">Sudah punya akun? <a href="{{ url_for('auth.login') }}">Login</a></div>
  </div>
</div>
</body>
</html>
